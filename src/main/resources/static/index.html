<!DOCTYPE html>
<html lang="ja">
<head>
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <title>ECサイト</title>
</head>
<body>

<h1>商品一覧</h1>

<div id="product-list"></div>

<h2>商品登録</h2>

<form id="product-form">

    <input type="text" id="name" placeholder="商品名">

    <input type="number" id="price" placeholder="価格">

    <input type="text" id="description" placeholder="説明">

    <button type="submit" id="submit-button">登録</button>

</form>

<script src="script.js"></script>

</body>
</html>
